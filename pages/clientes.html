<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Clientes</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>

<body>

  <header>
    <h1>Gestão de Clientes</h1>
    <button onclick="logout()" class="btn-logout" style="position: absolute; top: 1rem; right: 1rem; background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600;">Sair</button>
  </header>

  <main>
    <div class="botoes-principais">
      <button id="btn-todos" onclick="buscarTodosClientes()">Buscar Todos os Clientes</button>
      <button id="btn-cadastrar" onclick="cadastrarCliente()">Cadastrar Cliente</button>
      <button id="btn-testar" onclick="testarConexaoAPI()">Testar Conexão</button>
    </div>
    
    <div class="busca-cpf">
      <label for="cpf">Digite o CPF para busca específica:</label><br>
      <input type="text" id="cpf" maxlength="14" placeholder="Ex: 123.456.789-00" />
      <button id="btn-cpf" onclick="buscarClientePorCpf()">Buscar por CPF</button>
    </div>
    
        
    <div id="resultado"></div>
    <div id="erro" class="erro hidden"></div>
    
    <a href="../index.html" class="btn-voltar">←</a>
  </main>

  <script src="../scripts/script-login.js"></script>
  <script src="../scripts/script-clientes.js"></script>
</body>

</html>
